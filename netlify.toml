[build]
  base = "frontend"
  publish = "build"
  command = "npm install && npm run build"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/reservation"
  to = "/.netlify/functions/reservation"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
