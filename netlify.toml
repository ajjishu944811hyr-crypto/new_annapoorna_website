[build]
  publish = "frontend/build"
  command = "npm install && cd frontend && npm install && npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/reservation"
  to = "/.netlify/functions/reservation"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
